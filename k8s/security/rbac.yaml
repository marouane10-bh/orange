# ── RBAC for Prometheus cross-namespace scraping ──────────────────────────────
# Prometheus needs read access to pods and services in the app namespace.
# Without this, ServiceMonitors in the monitoring namespace cannot discover
# targets in ${APP_NAMESPACE}.
# Variables are substituted by scripts/deploy.sh from config.env.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-scraper
rules:
  - apiGroups: [""]
    resources: [pods, services, endpoints, nodes, nodes/metrics]
    verbs: [get, list, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors, podmonitors, prometheusrules]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-scraper-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-scraper
subjects:
  - kind: ServiceAccount
    name: kube-prom-stack-prometheus
    namespace: ${MONITORING_NAMESPACE}   # substituted by deploy.sh
