# ── NetworkPolicy: allow Prometheus to scrape app services ────────────────────
# This policy runs in the APP namespace and allows inbound traffic
# from the monitoring namespace on the metrics port only.
# Variables substituted by scripts/deploy.sh from config.env.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: ${APP_NAMESPACE}   # substituted by deploy.sh
spec:
  podSelector: {}   # applies to all pods in the namespace
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              purpose: observability   # matches the monitoring namespace label
      ports:
        - protocol: TCP
          port: ${METRICS_PORT}   # substituted by deploy.sh (default: 9000)
