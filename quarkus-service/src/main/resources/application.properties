# ══════════════════════════════════════════════════════════════════════════════
# application.properties — Quarkus service configuration
# Copy this file to your actual service's src/main/resources/
# and replace all CHANGE ME values.
# ══════════════════════════════════════════════════════════════════════════════

# ── Application identity ──────────────────────────────────────────────────────
# CHANGE ME: matches quarkus.micrometer.tags.application and Jaeger service name
quarkus.application.name=your-service-name

# ── T-01: Micrometer / Prometheus ─────────────────────────────────────────────

# Enable the Micrometer Prometheus registry
quarkus.micrometer.enabled=true
quarkus.micrometer.registry-enabled-default=true
quarkus.micrometer.export.prometheus.enabled=true

# Expose /q/metrics on a dedicated management port (separate from app traffic)
# Port 8080 → business/API traffic
# Port 9000 → monitoring traffic (scraped by Prometheus ServiceMonitor)
quarkus.management.enabled=true
quarkus.management.port=9000

# Global tags applied to every metric — appear as labels in Grafana
# CHANGE ME: set to your service name and environment
quarkus.micrometer.tags.application=your-service-name
quarkus.micrometer.tags.environment=poc

# Enable detailed HTTP metrics per URI and method
quarkus.micrometer.binder.http-server.enabled=true

# Enable JVM metrics: heap, GC pauses, thread count
quarkus.micrometer.binder.jvm=true

# Enable system metrics: CPU usage
quarkus.micrometer.binder.system=true

# ── Health checks ─────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── T-04: OpenTelemetry / distributed tracing ─────────────────────────────────

# Send traces to Jaeger via OTLP gRPC
# CHANGE ME: update the namespace if your Jaeger is in a different namespace
quarkus.otel.exporter.otlp.traces.endpoint=http://jaeger-collector.monitoring.svc:4317
quarkus.otel.exporter.otlp.traces.protocol=grpc

# Sampling rate:
#   always_on  → capture 100% of traces (good for PoC / debugging)
#   parentbased_traceidratio → capture X% (set ratio below for production)
quarkus.otel.traces.sampler=always_on
# quarkus.otel.traces.sampler=parentbased_traceidratio
# quarkus.otel.traces.sampler.arg=0.1   # 10% sampling for production

# W3C Trace Context is the standard propagation format
quarkus.otel.propagators=tracecontext,baggage

# Auto-instrument JDBC (database queries appear as spans)
quarkus.otel.instrument.jdbc=true

# Auto-instrument REST client calls (outbound HTTP calls appear as spans)
quarkus.otel.instrument.rest-client=true

# ── Test profile overrides ─────────────────────────────────────────────────────
# These properties only apply when running tests (mvn test)
# Disabling OTel avoids needing a real Jaeger instance during unit tests
%test.quarkus.otel.enabled=false
%test.quarkus.micrometer.export.prometheus.enabled=false

# ── Dev profile (mvn quarkus:dev) ─────────────────────────────────────────────
%dev.quarkus.otel.exporter.otlp.traces.endpoint=http://localhost:4317
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.level=INFO
