---
# ============================================================
# ExternalSecret — External Secrets Operator (ESO)
# Synchronise les secrets depuis Vault/AWS SSM vers K8s
# ============================================================

# SecretStore pointant vers HashiCorp Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: kogito-services
spec:
  provider:
    vault:
      server: "https://vault.internal.example.com"
      path: "kogito"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "kogito-services-role"
          serviceAccountRef:
            name: kogito-service-account

---
# ExternalSecret: credentials PostgreSQL
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kogito-postgres-credentials
  namespace: kogito-services
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: kogito-postgres-secret
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        QUARKUS_DATASOURCE_USERNAME: "{{ .username }}"
        QUARKUS_DATASOURCE_PASSWORD: "{{ .password }}"
        QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://{{ .host }}:5432/{{ .database }}"
  data:
    - secretKey: username
      remoteRef:
        key: kogito/postgres
        property: username
    - secretKey: password
      remoteRef:
        key: kogito/postgres
        property: password
    - secretKey: host
      remoteRef:
        key: kogito/postgres
        property: host
    - secretKey: database
      remoteRef:
        key: kogito/postgres
        property: database

---
# ExternalSecret: OIDC client secret Keycloak
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kogito-oidc-secret
  namespace: kogito-services
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: kogito-oidc-credentials
    creationPolicy: Owner
  data:
    - secretKey: QUARKUS_OIDC_CLIENT_ID
      remoteRef:
        key: kogito/keycloak
        property: client-id
    - secretKey: QUARKUS_OIDC_CREDENTIALS_SECRET
      remoteRef:
        key: kogito/keycloak
        property: client-secret
    - secretKey: QUARKUS_OIDC_AUTH_SERVER_URL
      remoteRef:
        key: kogito/keycloak
        property: auth-server-url

---
# ExternalSecret: Kafka credentials (SASL/SCRAM)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kogito-kafka-credentials
  namespace: kogito-services
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: kogito-kafka-secret
    creationPolicy: Owner
  data:
    - secretKey: KAFKA_SASL_USERNAME
      remoteRef:
        key: kogito/kafka
        property: username
    - secretKey: KAFKA_SASL_PASSWORD
      remoteRef:
        key: kogito/kafka
        property: password
