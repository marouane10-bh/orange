# ── Jaeger all-in-one deployment ─────────────────────────────────────────────
# For PoC only: uses in-memory storage.
# For production: replace with Jaeger + Elasticsearch or use Grafana Tempo.
# Variables substituted by scripts/deploy.sh from config.env.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:${JAEGER_IMAGE_VERSION}
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317    # receives traces from Quarkus (OTel)
            - name: otlp-http
              containerPort: 4318
            - name: thrift-http
              containerPort: 14268
          env:
            - name: SPAN_STORAGE_TYPE
              value: memory           # CHANGE TO: elasticsearch for production
            - name: MEMORY_MAX_TRACES
              value: "${JAEGER_MAX_TRACES}"
            - name: QUERY_BASE_PATH
              value: /
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 200m

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: monitoring
  labels:
    app: jaeger
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: thrift-http
      port: 14268
      targetPort: 14268
    - name: ui
      port: 16686
      targetPort: 16686
