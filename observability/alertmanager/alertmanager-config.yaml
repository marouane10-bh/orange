# ── Alertmanager configuration ────────────────────────────────────────────────
# Stored as a K8s Secret so credentials are not exposed in plain ConfigMaps.
# Variables substituted by scripts/deploy.sh from config.env.
#
# ROUTING LOGIC:
#   All alerts → email (team-email)
#   Critical alerts → also Slack (team-critical)
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-kube-prom-stack-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      # Default SMTP for all email receivers
      smtp_smarthost: "${ALERT_SMTP_HOST}"
      smtp_from: "${ALERT_EMAIL_FROM}"
      smtp_auth_username: "${ALERT_SMTP_USER}"
      smtp_auth_password: "${ALERT_SMTP_PASSWORD}"

    # ── Routing tree ────────────────────────────────────────────────────────
    route:
      group_by: ["alertname", "severity", "namespace"]
      group_wait: 30s          # wait before sending first notification (groups alerts)
      group_interval: 5m       # wait between notifications for the same group
      repeat_interval: 12h     # repeat notification if alert still firing after 12h
      receiver: "team-email"

      routes:
        # Critical alerts: notify via email AND Slack
        - matchers:
            - severity = critical
          receiver: "team-critical"
          continue: true   # continue = also send to parent receiver (team-email)

    # ── Receivers ───────────────────────────────────────────────────────────
    receivers:

      - name: "team-email"
        email_configs:
          - to: "${ALERT_EMAIL_TO}"
            send_resolved: true
            headers:
              Subject: "[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}"

      - name: "team-critical"
        slack_configs:
          - api_url: "${ALERT_SLACK_WEBHOOK}"
            channel: "${ALERT_SLACK_CHANNEL}"
            send_resolved: true
            title: "{{ if eq .Status \"firing\" }}ALERT{{ else }}RESOLVED{{ end }}: {{ .GroupLabels.alertname }}"
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ if .Annotations.runbook }}Runbook: {{ .Annotations.runbook }}{{ end }}
              {{ end }}
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

    # ── Inhibition rules ────────────────────────────────────────────────────
    inhibit_rules:
      # If a service is completely down, suppress the derived alerts
      # (no point alerting on error rate if the service is already down)
      - source_matchers:
          - alertname = "MainServiceDown"
        target_matchers:
          - alertname = "HighErrorRate"
        equal: ["namespace"]
