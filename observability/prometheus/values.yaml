# ── kube-prometheus-stack Helm values ────────────────────────────────────────
# Variables (${...}) are substituted by scripts/deploy.sh from config.env.
# To apply manually: helm install kube-prom-stack prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --values observability/prometheus/values.yaml --version 58.3.1
# ─────────────────────────────────────────────────────────────────────────────

prometheus:
  prometheusSpec:

    # Watch ServiceMonitors across ALL namespaces (not just monitoring)
    # Required to discover services in your app namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}

    # Data retention — keep short for PoC, increase for production
    retention: ${PROMETHEUS_RETENTION}     # e.g. 24h, 7d, 30d
    retentionSize: ${PROMETHEUS_STORAGE}   # e.g. 5Gi, 20Gi

    # Resource limits — adjust to your cluster capacity
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m

    # Persistent storage for metrics (survives pod restarts)
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: ${PROMETHEUS_STORAGE}

# Grafana disabled here — deployed separately for more control
grafana:
  enabled: false

# Alertmanager enabled — configured via alertmanager-config.yaml
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 100m

# kube-state-metrics: exposes K8s object metrics (pod states, deployments...)
kube-state-metrics:
  enabled: true

# node-exporter: exposes node-level metrics (CPU, disk, network)
prometheus-node-exporter:
  enabled: true
